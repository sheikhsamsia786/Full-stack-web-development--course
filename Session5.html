<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTMl Tables</title>
</head>

<body>
    <!-- practice task of session 4 -->
    <div style="display: inline; background: yellow;">Block Element 1</div>
    <div style="display: inline; background: red">Block Element 2</div>

    <Span style="display: block; background: yellow;">Span Element 1</Span>
    <Span>Span Element 2</Span>

    <!-- html tables -->
    <h2>My first table</h2>
    <table border="1" width="50%" cellpading="10" cellspacing="10">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>John</td>
            <td>25</td>
        </tr>
        <tr>
            <td>Shivangi</td>
            <td>30</td>
        </tr>
        <tr>
            <td>Raina</td>
            <td>20</td>
        </tr>

    </table>

    <h2>Marksheet</h2>
    <table border="1">
        <!-- header -->
        <thead>
            <tr>
                <th>Math</th>
                <th>Science</th>
                <th>Grade</th>
            </tr>
        </thead>
        <!-- body -->
        <tbody>
            <tr>
                <td>90</td>
                <td>87</td>
                <td rowspan="2">A</td>
            </tr>
        </tbody>
        <!-- footer -->
        <tfoot>
            <tr>
                <td colspan="2">
                    Total: 187
                </td>
            </tr>
        </tfoot>
    </table>

</body>

</html>
